name: tefa_kud
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.3
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  flutter_floating_bottom_bar: ^1.2.1+1
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.14
  intl_utils: ^2.8.7
  http: ^1.2.2
  google_fonts: ^6.2.1
  getwidget: ^4.0.0
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/background-receipt.png
    - assets/logo/
    - assets/images/banner/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo2.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/logo2.png"
  min_sdk_android: 21
  adaptive_icon_foreground_scale_factor: 0.95
  remove_alpha_ios: true

  fonts:
    - family: RedRose
      fonts:
        - asset: fonts/RedRose-Regular.ttf
        - asset: fonts/RedRose-Bold.ttf
          weight: 700
        - asset: fonts/RedRose-Light.ttf
          weight: 300
