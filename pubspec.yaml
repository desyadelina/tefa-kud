name: tefa_kud
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/

  fonts:
    - family: RedRose
      fonts:
        - asset: fonts/RedRose-Bold.ttf
        - weight: 700
        - asset: fonts/RedRose-Regular.ttf
        - weight: 400
        - asset: fonts/RedRose-Light.ttf
        - weight: 300  